<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南沙产业图谱编译 - 8+2+3现代化产业体系</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #007DFF;
      --primary-dark: #001A33;
      --secondary-color: #6B5CA5;
      --accent-color: #FFD700;
      --success-color: #00C853;
      --text-primary: #FFFFFF;
      --text-secondary: #8E8E93;
      --card-bg: #0A2463;
      --border-color: #1E3A5F;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--primary-dark);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .page {
      display: none;
      min-height: 100vh;
    }

    .page.active {
      display: block;
    }

    /* Header */
    .header-section {
      text-align: center;
      padding: 32px 16px 24px;
    }

    .header-section h1 {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00D4FF, #007DFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-section p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Section */
    .section {
      padding: 0 16px 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .section-number {
      font-size: 24px;
      font-weight: bold;
    }

    .section-title {
      font-size: 16px;
      font-weight: medium;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      gap: 10px;
    }

    .grid-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    .grid-2 {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .grid-1 {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0.2;
      border-radius: 12px;
    }

    .card-content {
      position: relative;
      z-index: 1;
    }

    .card-small {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card-small .card-title {
      font-size: 14px;
      font-weight: medium;
      margin-bottom: 4px;
    }

    .card-small .card-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .card-medium {
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card-medium .card-title {
      font-size: 16px;
      font-weight: medium;
      margin-bottom: 4px;
    }

    .card-medium .card-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .card-large {
      min-height: 140px;
      background: linear-gradient(135deg, var(--card-bg), var(--border-color));
    }

    .card-large .card-title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .card-large .card-stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 12px;
    }

    .card-large .stat-item {
      text-align: center;
    }

    .card-large .stat-value {
      font-size: 20px;
      font-weight: bold;
      display: block;
    }

    .card-large .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .card-large .card-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      text-align: right;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    /* Compile Overlay */
    .compile-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--primary-dark);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 32px;
    }

    .compile-overlay.active {
      display: flex;
    }

    .compile-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .compile-industry {
      font-size: 18px;
      color: #00D4FF;
      font-weight: medium;
      margin-bottom: 24px;
    }

    .progress-bar {
      width: 80%;
      height: 8px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00D4FF, #007DFF);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .compile-message {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 24px;
    }

    .compile-result {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    .compile-result-text {
      font-size: 16px;
      color: var(--success-color);
      font-weight: medium;
      margin-bottom: 16px;
    }

    .btn-primary {
      padding: 12px 48px;
      background: var(--primary-color);
      border: none;
      border-radius: 22px;
      color: white;
      font-size: 16px;
      font-weight: medium;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: #0066CC;
      transform: scale(1.05);
    }

    /* Detail Page */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .btn-back {
      width: 24px;
      height: 24px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn-back:hover {
      transform: translateX(-4px);
    }

    .detail-title {
      font-size: 20px;
      font-weight: bold;
    }

    .detail-category {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .detail-content {
      padding: 16px;
    }

    /* Graph Section */
    .graph-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .graph-title {
      font-size: 16px;
      font-weight: medium;
      margin-bottom: 16px;
    }

    .graph-container {
      position: relative;
      width: 100%;
      height: 420px;
    }

    .graph-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .graph-node {
      position: absolute;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .graph-node:hover {
      transform: scale(1.1);
    }

    .node-center {
      width: 80px;
      height: 80px;
      left: calc(50% - 40px);
      top: calc(50% - 40px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .node-center .node-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      opacity: 0.2;
      box-shadow: 0 0 20px currentColor;
    }

    .node-center .node-name {
      font-size: 16px;
      font-weight: medium;
      position: relative;
      z-index: 1;
    }

    .node-outer {
      width: 56px;
      height: 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .node-outer .node-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      opacity: 0.2;
      box-shadow: 0 0 12px currentColor;
    }

    .node-outer .node-name {
      font-size: 12px;
      font-weight: medium;
      position: relative;
      z-index: 1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .node-outer .node-type {
      font-size: 10px;
      position: relative;
      z-index: 1;
    }

    /* Wiki Section */
    .wiki-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .wiki-title {
      font-size: 16px;
      font-weight: medium;
      margin-bottom: 16px;
    }

    .wiki-overview {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 24px;
      margin-bottom: 16px;
    }

    .wiki-section-title {
      font-size: 12px;
      font-weight: medium;
      margin-bottom: 12px;
    }

    .tech-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tech-tag {
      padding: 6px 12px;
      background: var(--border-color);
      border-radius: 12px;
      font-size: 12px;
    }

    .goals-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .goal-item {
      display: flex;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .goal-bullet {
      color: #00D4FF;
    }

    /* Stats Section */
    .stats-section {
      margin-bottom: 24px;
    }

    .stats-title {
      font-size: 16px;
      font-weight: medium;
      margin-bottom: 16px;
    }

    .stats-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 14px;
      font-weight: medium;
      line-height: 20px;
    }

    /* Wiki Panel */
    .wiki-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border-radius: 16px 16px 0 0;
      padding: 16px;
      display: none;
      animation: slideUp 0.3s ease;
      max-height: 60vh;
      overflow-y: auto;
      z-index: 100;
    }

    .wiki-panel.active {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      opacity: 0.3;
    }

    .panel-info {
      flex: 1;
    }

    .panel-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .panel-type {
      font-size: 12px;
    }

    .btn-close {
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    .panel-description {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 24px;
      margin-bottom: 16px;
    }

    .panel-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .tag-value {
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
    }

    /* Widget */
    .widget-container {
      width: 320px;
      background: linear-gradient(135deg, #001A33, #0A2463);
      border-radius: 16px;
      padding: 16px;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .widget-title {
      font-size: 14px;
      font-weight: bold;
    }

    .widget-subtitle {
      font-size: 10px;
      color: #00D4FF;
      opacity: 0.8;
    }

    .widget-logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 125, 255, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      font-weight: bold;
    }

    .widget-content {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .widget-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      opacity: 0.3;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      font-weight: medium;
      box-shadow: 0 0 12px currentColor;
    }

    .widget-info {
      flex: 1;
    }

    .widget-message {
      font-size: 12px;
      line-height: 18px;
      margin-bottom: 4px;
    }

    .widget-progress {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .widget-progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .widget-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .widget-progress-text {
      font-size: 10px;
    }

    .widget-indicators {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .widget-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .widget-dot.active {
      background: currentColor;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

          keyTech: ['量子通信', '量子计算', '量子传感', '量子材料'],
          developmentGoals: ['2025年建成量子信息产业集聚区', '培育3家量子领域独角兽企业']
        },
        ranking: '国家量子信息创新高地',
        chainPosition: '量子通信+量子计算',
        corePolicy: '量子信息企业研发投入补贴50%'
      }
    ];

    let currentIndustry = null;

    function initHomePage() {
      const strategicGrid = document.getElementById('strategicGrid');
      const traditionalGrid = document.getElementById('traditionalGrid');
      const futureGrid = document.getElementById('futureGrid');

      const strategic = industryData.filter(i => i.category === 'strategic');
      const traditional = industryData.filter(i => i.category === 'traditional');
      const future = industryData.filter(i => i.category === 'future');

      strategic.forEach(industry => {
        const card = createSmallCard(industry);
        strategicGrid.appendChild(card);
      });

      traditional.forEach(industry => {
        const card = createMediumCard(industry);
        traditionalGrid.appendChild(card);
      });

      future.forEach(industry => {
        const card = createLargeCard(industry);
        futureGrid.appendChild(card);
      });
    }

    function createSmallCard(industry) {
      const card = document.createElement('div');
      card.className = 'card card-small';
      card.style.setProperty('--card-color', industry.color);
      card.innerHTML = `
        <div class="card-content">
          <div class="card-title">${industry.name}</div>
          <div class="card-subtitle">${industry.enterprises.length}家龙头企业</div>
        </div>
      `;
      card.querySelector('.card-content').style.color = industry.color;
      card.onclick = () => handleIndustryClick(industry);
      return card;
    }

    function createMediumCard(industry) {
      const card = document.createElement('div');
      card.className = 'card card-medium';
      card.innerHTML = `
        <div class="card-content">
          <div class="card-title">${industry.name}</div>
          <div class="card-subtitle">${industry.enterprises.length}家龙头企业</div>
        </div>
      `;
      card.onclick = () => handleIndustryClick(industry);
      return card;
    }

    function createLargeCard(industry) {
      const card = document.createElement('div');
      card.className = 'card card-large';
      card.style.background = `linear-gradient(135deg, ${industry.gradientColors[0]}20, ${industry.gradientColors[1]}20)`;
      card.innerHTML = `
        <div class="card-content" style="color: ${industry.color}">
          <div class="card-title">${industry.name}</div>
          <div class="card-stats">
            <div class="stat-item">
              <span class="stat-value">${industry.enterprises.length}</span>
              <span class="stat-label">龙头企业</span>
            </div>
            <div class="stat-item">
              <span class="stat-value">${industry.scenarios.length}</span>
              <span class="stat-label">产业载体</span>
            </div>
            <div class="stat-item">
              <span class="stat-value">${industry.policies.length}</span>
              <span class="stat-label">扶持政策</span>
            </div>
          </div>
          <div class="card-hint">点击查看知识图谱</div>
        </div>
      `;
      card.onclick = () => handleIndustryClick(industry);
      return card;
    }

    function handleIndustryClick(industry) {
      currentIndustry = industry;
      document.getElementById('compileIndustry').textContent = industry.name;
      document.getElementById('compileOverlay').classList.add('active');
      document.getElementById('compileResult').style.display = 'none';
      
      const messages = [
        '正在从南沙产业数据库提取实体...',
        '识别企业实体关系...',
        '建立场景关联图谱...',
        '提取政策依赖关系...',
        '构建知识图谱索引...',
        '知识图谱编译完成!'
      ];

      let step = 0;
      const stepDuration = 400;
      const progressFill = document.getElementById('progressFill');
      const compileMessage = document.getElementById('compileMessage');

      const animate = () => {
        if (step < messages.length) {
          compileMessage.textContent = messages[step];
          progressFill.style.width = `${Math.min(100, ((step + 1) / messages.length) * 100)}%`;
          step++;
          setTimeout(animate, stepDuration);
        } else {
          setTimeout(() => {
            document.getElementById('compileResult').style.display = 'block';
          }, 300);
        }
      };
      animate();
    }

    function navigateToDetail() {
      document.getElementById('compileOverlay').classList.remove('active');
      document.getElementById('homePage').classList.remove('active');
      document.getElementById('detailPage').classList.add('active');
      loadDetailPage(currentIndustry);
    }

    function goBack() {
      document.getElementById('detailPage').classList.remove('active');
      document.getElementById('homePage').classList.add('active');
      closeWikiPanel();
    }

    function loadDetailPage(industry) {
      document.getElementById('detailTitle').textContent = industry.name;
      document.getElementById('detailCategory').textContent = getCategoryLabel(industry.category);
      document.getElementById('wikiOverview').textContent = industry.wiki.overview;

      const techTags = document.getElementById('techTags');
      techTags.innerHTML = '';
      industry.wiki.keyTech.forEach(tech => {
        const tag = document.createElement('span');
        tag.className = 'tech-tag';
        tag.textContent = tech;
        techTags.appendChild(tag);
      });

      const goalsList = document.getElementById('goalsList');
      goalsList.innerHTML = '';
      industry.wiki.developmentGoals.forEach(goal => {
        const item = document.createElement('div');
        item.className = 'goal-item';
        item.innerHTML = `<span class="goal-bullet">•</span><span>${goal}</span>`;
        goalsList.appendChild(item);
      });

      const statsGrid = document.getElementById('statsGrid');
      statsGrid.innerHTML = `
        <div class="stat-card" style="border-left-color: #00D4FF">
          <div class="stat-label">全国排名</div>
          <div class="stat-value">${industry.ranking}</div>
        </div>
        <div class="stat-card" style="border-left-color: #FFD700">
          <div class="stat-label">产业链位置</div>
          <div class="stat-value">${industry.chainPosition}</div>
        </div>
        <div class="stat-card" style="border-left-color: #FF6B6B">
          <div class="stat-label">核心政策</div>
          <div class="stat-value">${industry.corePolicy}</div>
        </div>
      `;

      drawGraph(industry);
    }

    function getCategoryLabel(category) {
      const labels = {
        strategic: '战略新兴产业',
        traditional: '传统优势产业',
        future: '未来产业'
      };
      return labels[category] || '';
    }

    function drawGraph(industry) {
      const canvas = document.getElementById('graphCanvas');
      const ctx = canvas.getContext('2d');
      const container = document.getElementById('graphContainer');
      const rect = container.getBoundingClientRect();
      
      canvas.width = rect.width;
      canvas.height = rect.height;
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const radius = Math.min(rect.width, rect.height) * 0.25;

      ctx.clearRect(0, 0, rect.width, rect.height);

      ctx.strokeStyle = 'rgba(0, 125, 255, 0.3)';
      ctx.lineWidth = 2;

      const nodes = [];

      nodes.push({ type: 'center', x: centerX, y: centerY, name: industry.name, color: industry.color });

      industry.enterprises.forEach((ent, index) => {
        const angle = (index * 2 * Math.PI) / industry.enterprises.length - Math.PI / 2;
        nodes.push({
          type: 'enterprise',
          x: centerX + radius * Math.cos(angle),
          y: centerY + radius * Math.sin(angle),
          name: ent.name,
          color: '#00D4FF',
          data: ent
        });
      });

      industry.scenarios.forEach((scen, index) => {
        const angle = (index * 2 * Math.PI) / industry.scenarios.length + Math.PI / 4;
        nodes.push({
          type: 'scenario',
          x: centerX + (radius + 60) * Math.cos(angle),
          y: centerY + (radius + 60) * Math.sin(angle),
          name: scen.name,
          color: '#FFD700',
          data: scen
        });
      });

      industry.policies.forEach((pol, index) => {
        const angle = (index * 2 * Math.PI) / industry.policies.length - Math.PI / 4;
        nodes.push({
          type: 'policy',
          x: centerX + (radius + 120) * Math.cos(angle),
          y: centerY + (radius + 120) * Math.sin(angle),
          name: pol.name,
          color: '#FF6B6B',
          data: pol
        });
      });

      nodes.forEach(node => {
        if (node.type !== 'center') {
          ctx.beginPath();
          ctx.moveTo(centerX, centerY);
          ctx.lineTo(node.x, node.y);
          ctx.stroke();
        }
      });

      const graphNodes = document.getElementById('graphNodes');
      graphNodes.innerHTML = '';

      nodes.forEach((node, index) => {
        const nodeEl = document.createElement('div');
        nodeEl.className = node.type === 'center' ? 'graph-node node-center' : 'graph-node node-outer';
        nodeEl.style.left = `${node.x}px`;
        nodeEl.style.top = `${node.y}px`;
        nodeEl.style.transform = node.type === 'center' ? 'translate(-50%, -50%)' : 'translate(-50%, -50%) scale(0)';
        nodeEl.style.transition = `all 0.5s ease ${index * 100}ms`;
        nodeEl.style.color = node.color;
        
        setTimeout(() => {
          nodeEl.style.transform = node.type === 'center' ? 'translate(-50%, -50%)' : 'translate(-50%, -50%) scale(1)';
        }, 100);

        nodeEl.innerHTML = `
          <div class="node-bg" style="background: ${node.color}"></div>
          <div class="node-name">${node.name}</div>
          ${node.type !== 'center' ? `<div class="node-type" style="color: ${node.color}">${getNodeTypeLabel(node.type)}</div>` : ''}
        `;

        nodeEl.onclick = () => openWikiPanel(node);
        graphNodes.appendChild(nodeEl);
      });
    }

    function getNodeTypeLabel(type) {
      const labels = {
        enterprise: '企业',
        scenario: '载体',
        policy: '政策'
      };
      return labels[type] || '';
    }

    function openWikiPanel(node) {
      document.getElementById('panelIcon').style.background = node.color;
      document.getElementById('panelIcon').style.opacity = '0.3';
      document.getElementById('panelTitle').textContent = node.name;
      document.getElementById('panelType').textContent = getNodeTypeLabel(node.type);
      document.getElementById('panelType').style.color = node.color;
      document.getElementById('panelDescription').textContent = node.data?.description || '';

      const panelTag = document.getElementById('panelTag');
      if (node.data?.type) {
        panelTag.innerHTML = `
          <span>类型：</span>
          <span class="tag-value" style="background: ${node.color}20; color: ${node.color}">${node.data.type}</span>
        `;
      } else {
        panelTag.innerHTML = '';
      }

      document.getElementById('wikiPanel').classList.add('active');
    }

    function closeWikiPanel() {
      document.getElementById('wikiPanel').classList.remove('active');
    }

    document.addEventListener('DOMContentLoaded', initHomePage);
  </script>
</body>
</html>
